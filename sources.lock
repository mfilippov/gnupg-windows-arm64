# sources.lock — pinned source archives for the GnuPG Windows ARM64 build
# Format: archive|url|sha256|builds|dir
#
#   builds  comma-separated tags: main (gnupg suite)
#   dir     target directory name after extraction
#
# gnupg.org packages also carry detached GPG signatures (.tar.bz2.sig).
# Download scripts verify both SHA256 (from this file) and the GPG signature
# (using keys/gnupg-release.asc, pinned in this repo).
#
# SHA256 values sourced from https://gnupg.org/download/integrity_check.html
# and https://zlib.net — committed here as the source of truth.
#
# PLACEHOLDER entries must be populated by running tools/update-checksums.sh
# before the first build.

