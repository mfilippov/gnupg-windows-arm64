name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  set-version:
    runs-on: ubuntu-latest
    outputs:
      gnupg: ${{ steps.ver.outputs.gnupg }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Extract GnuPG version
      id: ver
      run: |
        ver=$(grep '^gnupg-' sources.lock | head -1 | cut -d'|' -f1 | sed 's/^gnupg-//;s/\.tar\.bz2$//')
        echo "gnupg=$ver" >> "$GITHUB_OUTPUT"

  build:
    needs: [set-version]
    runs-on: ubuntu-latest
    env:
      VER: ${{ needs.set-version.outputs.gnupg }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build GnuPG
      run: |
        set -o pipefail
        ./build.sh gnupg 2>&1 | tee /tmp/build.log
    - name: Stage artifact
      run: unzip -qo dist/gnupg.zip -d dist/gnupg-staged
    - name: Upload gnupg artifact
      uses: actions/upload-artifact@v7
      with:
        name: gnupg-${{ env.VER }}_windows_arm64
        path: dist/gnupg-staged/

  build-qt:
    needs: [set-version]
    runs-on: ubuntu-latest
    env:
      VER: ${{ needs.set-version.outputs.gnupg }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Build pinentry-qt
      run: |
        set -o pipefail
        ./build.sh pinentry-qt 2>&1 | tee /tmp/build.log
    - name: Stage artifact
      run: unzip -qo dist/pinentry-qt.zip -d dist/pinentry-qt-staged
    - name: Upload pinentry-qt artifact
      uses: actions/upload-artifact@v7
      with:
        name: pinentry-qt-${{ env.VER }}_windows_arm64
        path: dist/pinentry-qt-staged/

  release:
    needs: [set-version, build, build-qt]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VER: ${{ needs.set-version.outputs.gnupg }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Download gnupg artifact
      uses: actions/download-artifact@v8
      with:
        name: gnupg-${{ env.VER }}_windows_arm64
        path: dist/gnupg-staged
    - name: Download pinentry-qt artifact
      uses: actions/download-artifact@v8
      with:
        name: pinentry-qt-${{ env.VER }}_windows_arm64
        path: dist/pinentry-qt-staged
    - name: Merge and create release zips
      run: |
        mkdir -p dist/bundle
        cp -r  dist/gnupg-staged/. dist/bundle/
        cp -rn dist/pinentry-qt-staged/. dist/bundle/
        (cd dist/gnupg-staged    && zip -r "../gnupg-${VER}_windows_arm64.zip" gnupg/)
        (cd dist/pinentry-qt-staged && zip -r "../pinentry-qt-${VER}_windows_arm64.zip" gnupg/)
        (cd dist/bundle          && zip -r "../gnupg-with-pinentry-qt-${VER}_windows_arm64.zip" gnupg/)
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/gnupg-${{ env.VER }}_windows_arm64.zip
          dist/pinentry-qt-${{ env.VER }}_windows_arm64.zip
          dist/gnupg-with-pinentry-qt-${{ env.VER }}_windows_arm64.zip
